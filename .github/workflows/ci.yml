name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  NUXT_TELEMETRY_DISABLED: 1

jobs:
  quality:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Prepare Nuxt types
        run: |
          for cfg in apps/*/nuxt.config.ts layers/*/nuxt.config.ts; do
            [ -f "$cfg" ] || continue
            dir="$(dirname "$cfg")"
            echo "::group::nuxt prepare — $dir"
            (cd "$dir" && pnpm exec nuxt prepare)
            echo "::endgroup::"
          done

      - name: Lint & Typecheck
        run: pnpm quality

      - name: Unit Tests
        run: pnpm -r --if-present test:unit

  # ── Deploy pipeline (push to main only) ──

  preflight:
    name: Preflight
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      method: ${{ steps.creds.outputs.method }}
    steps:
      - name: Validate credentials
        id: creds
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          CF_API: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -n "$DOPPLER_TOKEN" ]; then
            echo "method=doppler" >> "$GITHUB_OUTPUT"
            echo "✓ Using Doppler (hub-and-spoke) for secret resolution"
          elif [ -n "$CF_API" ] && [ -n "$CF_ACCOUNT" ]; then
            echo "method=direct" >> "$GITHUB_OUTPUT"
            echo "✓ Using direct Cloudflare credentials"
          else
            echo "::error::No deployment credentials configured."
            echo "Configure DOPPLER_TOKEN (recommended) or CLOUDFLARE_API_TOKEN + CLOUDFLARE_ACCOUNT_ID."
            exit 1
          fi

  deploy:
    name: Deploy web
    needs: [preflight]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Fetch secrets from Doppler
        if: needs.preflight.outputs.method == 'doppler'
        uses: dopplerhq/secrets-fetch-action@v1.3.1
        with:
          doppler-token: ${{ secrets.DOPPLER_TOKEN }}
          inject-env-vars: true

      - name: Set direct Cloudflare credentials
        if: needs.preflight.outputs.method == 'direct'
        env:
          CF_API: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "CLOUDFLARE_API_TOKEN=$CF_API" >> "$GITHUB_ENV"
          echo "CLOUDFLARE_ACCOUNT_ID=$CF_ACCOUNT" >> "$GITHUB_ENV"

      - name: Validate Cloudflare credentials
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::error::Cloudflare credentials missing after secret resolution."
            exit 1
          fi

      - name: Run D1 migrations (remote)
        working-directory: apps/web
        run: |
          echo "Running remote migrations..."
          # Dynamically run the db:migrate script against the remote database
          cmd=$(node -p "require('./package.json').scripts['db:migrate']?.replace('--local', '--remote') || ''")
          if [ -n "$cmd" ]; then
            pnpm exec $cmd
          else
            echo "No db:migrate script found!"
            exit 1
          fi

      - name: Build & Deploy
        id: deploy
        working-directory: apps/web
        run: |
          pnpm build
          deploy_output=$(pnpm exec wrangler deploy)
          echo "$deploy_output"
          # Extract workers.dev URL (last https URL containing .workers.dev)
          url=$(echo "$deploy_output" | grep -oE 'https://[^ ]+\.workers\.dev' | tail -n 1)
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Smoke Test D1 Database
        run: |
          URL="${{ steps.deploy.outputs.url }}"
          if [ -z "$URL" ]; then
            echo "::error::No deployment URL found for smoke test."
            exit 1
          fi
          echo "Testing $URL/api/users..."
          # Allow a few seconds for deployment to propagate, then retry
          for i in 1 2 3 4 5; do
            status_code=$(curl -s -o /dev/null -w "%{http_code}" "$URL/api/users")
            if [ "$status_code" = "200" ]; then
              echo "✅ Smoke test passed."
              exit 0
            fi
            echo "Attempt $i: got $status_code, retrying in 5s..."
            sleep 5
          done
          echo "::error::Smoke test failed! Expected 200, got $status_code"
          exit 1
